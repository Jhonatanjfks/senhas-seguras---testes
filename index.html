<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senhas Seguras</title>
</head>
<body>
<section class="conteudo">
    <div class="conteudo-titulo">
        <img src="unlock.svg" alt="cadeado fechado">
        <h2 class="titulo principal">gerador de senhas</h2>
        <h3 class="titulo segundario">Gere instantaneamente uma
            senha aleatoria e segura</h3>
    </div>
    <div class="conteudo senha">
        <label for="senha">senha</label>
        <input name="senha" type="text" id="campo senha">
        <div>
            <div class="parametro">
                <H3 class="parametro titulo">personalise sua senha</H3>
                <div class="parametro-coluna__senha">
                    <div class="parametro-senha">
                        <h4 class="parametro-senha__titulo">numero de caracteres</h4>
                        <div class="parametros-senha-botoes">
                            <button class="parametro-senha__botao"></button>
                            <p class="parametro-senha__texto">12</p>
                            <button class="parametro-senha__botao">+</button>
                        </div>
                        <div class="parametro senha">
                            <H4 class="parametro-senha__coluna">numero de caracteres</H4>
                            <div class="parametro-senha__botao">
                                <button class="parametro-senha__botao">-</button>
                                <p class="parametro-senha__texto">12</p>
                                <button class="parametro-senha__botao">+</button>
                            </div>
                        </div>
</section>
</body>
</html>
